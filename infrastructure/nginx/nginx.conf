# Main context (this is the global configuration)
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server {
        listen 443 ssl;  # Listen on port 443 for HTTPS
        server_name homepage.robertharte.net;

        # Proxying requests to docker containers
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # SSL certificate settings
        ssl_certificate /etc/nginx/nginx-certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/nginx-certs/nginx-selfsigned.key;
    }

    server {
        listen 443 ssl;  # Listen on port 443 for HTTPS
        server_name pgadmin.robertharte.net;

        # Proxying requests to pgadmin containers
        location / {
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # SSL certificate settings
        ssl_certificate /etc/nginx/nginx-certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/nginx-certs/nginx-selfsigned.key;
    }

    # Optional server block for HTTP to HTTPS redirection
    server {
        listen 80;  # Listen on port 80 for HTTP
        server_name localhost;

        # Redirect all HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }
}